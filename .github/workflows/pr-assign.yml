# Assign PR author + LLM-pick a reviewer for external contributors.
name: PR Assign

# Share concurrency group with pr-triage so they serialize on the same PR.
concurrency:
  group: pr-open-${{ github.event.pull_request.number }}
  cancel-in-progress: false

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Assign PR
        env:
          AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          POLLINATIONS_KEY: ${{ secrets.CI_POLLINATIONS_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/pr_assign.py
