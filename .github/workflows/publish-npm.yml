name: Publish @elixpo/lixeditor to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/lixeditor/**'
  # Manual trigger lets you choose the bump kind explicitly.
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump kind (patch / minor / major). Default: patch"
        required: false
        default: 'patch'

# Required so the elixpoo bot can:
#  - push the version-bump commit back to main (contents: write)
#  - publish to GitHub Packages (packages: write)
permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to NPM + GitHub Packages
    runs-on: ubuntu-latest
    # Skip the workflow when the commit that triggered it was already
    # the bot's own version-bump — avoids an infinite loop.
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, 'chore(release): bump @elixpo/lixeditor')
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the agent token so the follow-up `git push` is authorized
          # to write back to the protected `main` branch.
          token: ${{ secrets.CI_AGENT_TOKEN }}
          # We need full history so commit/push works cleanly.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure git as elixpoo bot
        run: |
          git config --global user.name "elixpoo"
          git config --global user.email "269200728+elixpoo@users.noreply.github.com"

      # ── Decide the next version ─────────────────────────────────────
      # Compare the local package.json version against npm's published
      # version. If they differ, the human already bumped — respect it.
      # If they match, auto-bump (patch by default, configurable via
      # workflow_dispatch input).
      - name: Compute next version
        id: version
        working-directory: packages/lixeditor
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          # `npm view` can timeout / rate-limit and return "0.0.0" via the
          # fallback below, which then makes the LOCAL == REMOTE check
          # fail and skips the bump — even though LOCAL IS already on npm.
          # Treat any non-semver REMOTE as unknown and fall back to a
          # direct "is LOCAL already published?" probe as the truth source.
          REMOTE=$(npm view @elixpo/lixeditor version 2>/dev/null || echo "unknown")
          BUMP="${{ github.event.inputs.bump || 'patch' }}"

          echo "Local  version: $LOCAL"
          echo "Remote version: $REMOTE"
          echo "Bump kind: $BUMP"

          # Decide whether we need to bump. Three cases:
          #   1. LOCAL == REMOTE                          → bump
          #   2. LOCAL is already published (probe hit)   → bump (publish would 409)
          #   3. LOCAL strictly ahead of REMOTE           → respect manual bump
          NEEDS_BUMP=false
          if [ "$LOCAL" = "$REMOTE" ]; then
            NEEDS_BUMP=true
          elif [ "$REMOTE" = "unknown" ]; then
            if npm view "@elixpo/lixeditor@${LOCAL}" version >/dev/null 2>&1; then
              echo "LOCAL ($LOCAL) already exists on npm — bumping."
              NEEDS_BUMP=true
            fi
          fi

          if [ "$NEEDS_BUMP" = "true" ]; then
            # `npm version` in a workspace emits "<pkg-name>\nv<x.y.z>"
            # to stdout — capturing that produces a multi-line shell var
            # that corrupts $GITHUB_OUTPUT. Bump silently and read the
            # new version from package.json instead.
            npm version "$BUMP" --no-git-tag-version > /dev/null
            NEW=$(node -p "require('./package.json').version")
            echo "Bumped to $NEW"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "auto_bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Local ($LOCAL) ahead of remote ($REMOTE) — using local as-is."
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "auto_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Publish to npmjs ────────────────────────────────────────────
      # The `actions/setup-node@v4` step above with `registry-url` writes
      # a project-level `.npmrc` that maps the registry to `${NODE_AUTH_
      # TOKEN}`. Passing the auth via `NODE_AUTH_TOKEN` is the standard
      # path (matches what npm-publish-action / Verdaccio docs recommend).
      # Inline `--//registry/:_authToken=...` flags work in some setups
      # but were producing E404 "Not Found - PUT" here — npm treats that
      # as auth-failed and returns 404 rather than 403.
      - name: Publish to NPM
        working-directory: packages/lixeditor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_LIXEDITOR_PUBLISH_TOKEN }}
        run: npm publish --access public

      # ── Mirror to GitHub Packages ───────────────────────────────────
      # GitHub Packages requires `repository.url` to match the running
      # repo, so we rewrite it just-in-time and restore it.
      - name: Reconfigure Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@elixpo'

      - name: Publish to GitHub Packages
        # Non-blocking: GitHub Packages requires the org to grant
        # write:packages to the default GITHUB_TOKEN AND to link the
        # package to this repo. If either is missing the PUT 403's.
        # Until that's set up, npmjs (above) is the canonical registry.
        # To enable the mirror:
        #   1. Org → Settings → Actions → General → Workflow permissions
        #      → "Read and write permissions"
        #   2. Org → Packages → @elixpo/lixeditor → Settings →
        #      Manage Actions access → Add this repo with Write role
        # Or replace `secrets.GITHUB_TOKEN` with a PAT that has the
        # `write:packages` scope.
        continue-on-error: true
        working-directory: packages/lixeditor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORIGINAL_REPO=$(node -p "JSON.stringify(require('./package.json').repository || null)")
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.repository = { type: 'git', url: 'git+https://github.com/${{ github.repository }}.git' };
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          if npm publish --access public --registry https://npm.pkg.github.com; then
            echo "::notice::Published to GitHub Packages."
          else
            echo "::warning::GitHub Packages publish failed (likely permission_denied: write_package). The npmjs publish above is canonical; this mirror is best-effort. See the comment in this step for how to fix the org permissions."
          fi
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const orig = $ORIGINAL_REPO;
            if (orig) pkg.repository = orig; else delete pkg.repository;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # ── Commit the auto-bumped version back to main ─────────────────
      # Only runs when we actually bumped this run; if the human already
      # bumped before pushing, there's nothing to commit.
      - name: Commit and push version bump
        if: steps.version.outputs.auto_bumped == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add packages/lixeditor/package.json packages/lixeditor/package-lock.json 2>/dev/null || \
            git add packages/lixeditor/package.json
          git commit -m "chore(release): bump @elixpo/lixeditor to v${VERSION}

          Auto-bumped by the publish workflow after a change under
          packages/lixeditor/** was merged without a manual version bump.

          [skip ci]"
          git push origin HEAD:main

      - name: Tag the release
        if: steps.version.outputs.auto_bumped == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "lixeditor-v${VERSION}" -m "lixeditor v${VERSION}"
          git push origin "lixeditor-v${VERSION}"

      - name: Summary
        run: |
          echo "### Published @elixpo/lixeditor@${{ steps.version.outputs.version }} 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/@elixpo/lixeditor/v/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Packages: https://github.com/${{ github.repository }}/pkgs/npm/lixeditor" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-bumped: \`${{ steps.version.outputs.auto_bumped }}\`" >> $GITHUB_STEP_SUMMARY
